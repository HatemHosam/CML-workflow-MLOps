name: CIFAR-10 Model Pipeline
on: [pull_request]

jobs:
  train-and-report:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. Install PyTorch, Torchvision, and Matplotlib
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requirements.txt

      # 4. Initialize CML tooling
      - name: Setup CML
        uses: iterative/setup-cml@v2

      # 5. Run the CIFAR-10 pipeline code
      - name: Train CIFAR-10 Model
        run: python train.py

      # 6. Parse metrics and images into the GitHub PR comment
      - name: Write CML Report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Copy the text metrics to the report markdown file
          cat metrics.txt >> report.md
          
          # Add the header and publish the graph image via CML
          echo "### Performance Curves" >> report.md
          cml-publish curves.png --md >> report.md
          
          # Post the complete markdown file as a PR comment
          cml-send-comment report.md

